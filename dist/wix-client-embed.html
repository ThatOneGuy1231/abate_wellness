<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0B0B0C; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="app" src="https://abate-booking.vercel.app?view=client"></iframe>
  <script>
    var app = document.getElementById('app');
    var queue = [];
    var ready = false;

    function flush() {
      ready = true;
      for (var i = 0; i < queue.length; i++) {
        app.contentWindow.postMessage(queue[i], '*');
      }
      queue = [];
    }

    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;
      if (e.source === app.contentWindow) {
        if (e.data.type === 'abate-ready') { flush(); return; }
        if (e.data.type === 'abate-resize') return;
        window.parent.postMessage(e.data, '*');
        return;
      }
      if (ready) {
        app.contentWindow.postMessage(e.data, '*');
      } else {
        queue.push(e.data);
      }
    });

    setTimeout(function() { if (!ready) flush(); }, 5000);
  </script>
</body>
</html>
